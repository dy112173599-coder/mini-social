<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷你社交 - 私聊+五子棋</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #fff;
            --text: #333;
            --text-secondary: #888;
            --border: #e8e8e8;
            --input-bg: #fafafa;
            --hover: #f8f9ff;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --gradient: linear-gradient(135deg, #667eea, #764ba2);
            --badge-bg: #e74c3c;
        }
        .dark-mode {
            --bg: #1a1a2e;
            --card-bg: #252540;
            --text: #e0e0e0;
            --text-secondary: #999;
            --border: #3a3a55;
            --input-bg: #2a2a45;
            --hover: #2e2e50;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: all 0.3s;
        }
        .app { width: 100%; max-width: 680px; }
        .hidden { display: none !important; }
        
        .color-avatar {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
        }
        .av-lg { width: 50px; height: 50px; font-size: 22px; }
        .av-md { width: 40px; height: 40px; font-size: 18px; }
        .av-sm { width: 30px; height: 30px; font-size: 13px; }
        .av-xs { width: 24px; height: 24px; font-size: 11px; }
        
        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
        }
        
        .auth-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        .auth-card h2 { font-size: 26px; margin-bottom: 6px; color: var(--text); }
        .auth-card .subtitle { color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            background: var(--input-bg);
            color: var(--text);
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        textarea { resize: none; font-family: inherit; }
        
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .remember-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-primary {
            background: var(--gradient);
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-sm {
            padding: 6px 16px;
            font-size: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            border-radius: 20px;
        }
        .btn-sm:hover { background: var(--hover); }
        .btn-sm.following { background: #e8e8ff; border-color: #667eea; color: #667eea; }
        .btn-sm.danger { color: #e74c3c; border-color: #fcc; }
        .btn-sm.danger:hover { background: #fff0f0; }
        .btn-sm.pin { color: #f39c12; border-color: #fde3a7; }
        .btn-sm.pin.pinned { background: #fff8e1; }
        .btn-sm.game { color: #27ae60; border-color: #a8f0c6; }
        .btn-sm.game:hover { background: #e8fdf2; }
        .btn-sm.chat-btn { color: #3498db; border-color: #b8d8f8; }
        .btn-sm.chat-btn:hover { background: #eaf4fd; }
        
        .btn-icon {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            position: relative;
        }
        
        .notification-bell { position: relative; display: inline-block; }
        .badge {
            position: absolute;
            top: 0; right: 0;
            width: 18px; height: 18px;
            background: var(--badge-bg);
            border-radius: 50%;
            font-size: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 10px 18px;
            border-radius: 14px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            gap: 8px;
        }
        .nav .nav-left { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav .nav-right { display: flex; align-items: center; gap: 8px; }
        .nav .username { font-weight: 600; color: var(--text); }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
            background: var(--card-bg);
            border-radius: 25px;
            padding: 4px;
            box-shadow: var(--shadow);
        }
        .tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 22px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            font-weight: 500;
            white-space: nowrap;
        }
        .tabs button.active { background: var(--gradient); color: white; }
        
        .post-create { display: flex; gap: 12px; align-items: flex-start; }
        .post-create .input-area { flex: 1; }
        .post-create textarea { height: 50px; border-radius: 20px; padding: 14px 18px; }
        .post-create .btn-primary { width: auto; padding: 10px 24px; border-radius: 20px; font-size: 14px; }
        
        .post { transition: transform 0.2s; position: relative; }
        .post:hover { transform: translateY(-2px); }
        .post.pinned-post { border: 2px solid #f39c12; box-shadow: 0 2px 16px rgba(243,156,18,0.15); }
        .post .pin-badge { position: absolute; top: 12px; right: 12px; color: #f39c12; font-size: 14px; }
        .post .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; }
        .post .author-info { flex: 1; }
        .post .author-name { font-weight: 600; font-size: 14px; cursor: pointer; }
        .post .author-name:hover { color: #667eea; }
        .post .post-time { font-size: 11px; color: var(--text-secondary); }
        .post .post-content { margin: 8px 0; line-height: 1.6; font-size: 15px; padding-left: 60px; }
        .post .post-actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            padding-left: 60px;
        }
        .actions { display: flex; gap: 10px; }
        .actions .btn-sm.liked { background: #fff0f3; color: #e74c3c; border-color: #ffccd5; }
        .post-menu { display: flex; gap: 4px; }
        
        .comment-section { margin-top: 10px; padding-left: 60px; }
        .comment-list { max-height: 200px; overflow-y: auto; margin-bottom: 8px; }
        .comment-item {
            display: flex; gap: 8px; align-items: flex-start;
            padding: 6px 0; font-size: 13px; position: relative;
        }
        .comment-item .comment-body { flex: 1; }
        .comment-item .comment-author { font-weight: 600; }
        .comment-item .delete-comment-btn {
            position: absolute; right: 0; top: 4px;
            background: none; border: none; color: #ccc;
            cursor: pointer; font-size: 14px; display: none;
        }
        .comment-item:hover .delete-comment-btn { display: block; }
        .comment-item .delete-comment-btn:hover { color: #e74c3c; }
        .comment-input-row { display: flex; gap: 8px; align-items: center; }
        .comment-input-row input { margin: 0; font-size: 13px; padding: 8px 14px; }
        .comment-input-row .btn-sm { white-space: nowrap; padding: 8px 16px; background: #667eea; color: white; border: none; }
        
        .user-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.2s;
        }
        .user-item:hover { background: var(--hover); }
        .user-item:last-child { border-bottom: none; }
        .user-item .user-info { flex: 1; }
        .user-item .user-name { font-weight: 600; }
        .user-item .user-bio { font-size: 12px; color: var(--text-secondary); }
        
        .profile-header { text-align: center; padding: 20px; }
        .profile-header .bio { color: var(--text-secondary); margin-top: 8px; }
        .profile-stats {
            display: flex; justify-content: center; gap: 20px;
            margin: 15px 0; flex-wrap: wrap;
        }
        .profile-stats .stat { text-align: center; }
        .profile-stats .stat-num { font-size: 22px; font-weight: 700; color: #667eea; }
        .profile-stats .stat-label { font-size: 11px; color: var(--text-secondary); }
        
        /* 五子棋 */
        .game-board-container { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .board-canvas { background: #deb887; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
        .game-info { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 450px; padding: 10px; background: var(--card-bg); border-radius: 10px; }
        .player-indicator { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 20px; font-weight: 600; font-size: 14px; }
        .player-indicator.active { background: #e8fdf2; border: 2px solid #27ae60; }
        .player-indicator.waiting { opacity: 0.5; }
        .game-chat { max-height: 150px; overflow-y: auto; width: 100%; max-width: 450px; background: var(--card-bg); border-radius: 10px; padding: 10px; margin-top: 8px; }
        .game-chat .chat-msg { font-size: 13px; padding: 3px 0; }
        .game-chat-input { display: flex; gap: 8px; width: 100%; max-width: 450px; }
        .game-chat-input input { flex: 1; margin: 0; font-size: 13px; padding: 8px 14px; }
        .game-status { text-align: center; font-size: 18px; font-weight: 700; padding: 10px; color: #667eea; }
        
        /* 私聊 */
        .chat-contacts {
            display: flex; flex-direction: column; gap: 2px;
        }
        .contact-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; cursor: pointer; transition: background 0.2s;
            border-radius: 10px;
        }
        .contact-item:hover { background: var(--hover); }
        .contact-item .contact-info { flex: 1; }
        .contact-item .contact-name { font-weight: 600; font-size: 14px; }
        .contact-item .contact-last { font-size: 12px; color: var(--text-secondary); }
        .contact-item .contact-time { font-size: 11px; color: var(--text-secondary); }
        
        .chat-messages {
            max-height: 350px; overflow-y: auto; padding: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .chat-bubble {
            max-width: 75%; padding: 10px 14px;
            border-radius: 18px; font-size: 14px;
            line-height: 1.4; word-break: break-word;
        }
        .chat-bubble.mine {
            background: var(--gradient); color: white;
            align-self: flex-end; border-bottom-right-radius: 4px;
        }
        .chat-bubble.theirs {
            background: var(--input-bg); color: var(--text);
            align-self: flex-start; border-bottom-left-radius: 4px;
        }
        .chat-bubble .bubble-time {
            font-size: 10px; opacity: 0.7; margin-top: 4px;
            display: block; text-align: right;
        }
        
        .notification-panel {
            position: fixed; top: 0; right: 0;
            width: 360px; max-width: 90vw; height: 100vh;
            background: var(--card-bg);
            box-shadow: -4px 0 20px rgba(0,0,0,0.15);
            z-index: 200; overflow-y: auto;
            transform: translateX(100%); transition: transform 0.3s;
        }
        .notification-panel.open { transform: translateX(0); }
        .notification-panel .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: var(--card-bg); z-index: 1;
        }
        .notification-panel .panel-header h3 { font-size: 18px; }
        .notification-item {
            padding: 14px 20px; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.2s;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .notification-item:hover { background: var(--hover); }
        .notification-item.unread { background: #f0f2ff; }
        .dark-mode .notification-item.unread { background: #2a2a50; }
        .notification-item .notif-text { flex: 1; font-size: 14px; line-height: 1.5; }
        .notification-item .notif-time { font-size: 11px; color: var(--text-secondary); }
        .notification-item .notif-actions { display: flex; gap: 6px; margin-top: 6px; }
        .notif-empty { text-align: center; padding: 40px; color: var(--text-secondary); }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .modal {
            background: var(--card-bg);
            border-radius: 16px; padding: 24px;
            width: 90%; max-width: 520px;
            max-height: 85vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal h3 { margin-bottom: 15px; text-align: center; }
        .modal .close-btn {
            float: right; background: none; border: none;
            font-size: 24px; cursor: pointer; color: var(--text-secondary);
        }
        
        .switch-link { color: #667eea; cursor: pointer; margin-top: 15px; display: inline-block; font-size: 14px; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 6px; }
        .success-msg { color: #27ae60; font-size: 13px; margin-top: 6px; }
        .empty-state { text-align: center; color: var(--text-secondary); padding: 40px; }
        .loading { text-align: center; color: var(--text-secondary); padding: 30px; }
        .search-box { margin-bottom: 12px; }
        
        @media (max-width: 500px) {
            .post .post-content, .post .post-actions-row, .comment-section { padding-left: 0; }
            .post-create { flex-direction: column; }
            .tabs button { font-size: 11px; padding: 8px 4px; }
            .profile-stats { gap: 12px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div id="authSection" class="auth-card">
        <h2>🌐 迷你社交</h2>
        <p class="subtitle" id="authTitle">登录你的账号</p>
        <input type="text" id="usernameInput" placeholder="👤 用户名">
        <input type="password" id="passwordInput" placeholder="🔒 密码">
        <div id="registerFields" class="hidden">
            <input type="text" id="bioInput" placeholder="📝 个性签名（可选）" maxlength="50">
        </div>
        <label class="remember-row" id="rememberRow">
            <input type="checkbox" id="rememberCheckbox"> 记住密码
        </label>
        <button class="btn btn-primary" id="authBtn" onclick="loginOrRegister()">登 录</button>
        <div class="switch-link" id="switchMode">没有账号？点击注册</div>
        <div id="authMsg" class="error-msg"></div>
    </div>

    <div id="mainSection" class="hidden">
        <div class="nav">
            <div class="nav-left" onclick="showMyProfile()">
                <div id="navAvatar"></div>
                <span class="username" id="navUsername"></span>
            </div>
            <div class="nav-right">
                <button class="btn-icon" onclick="switchTab('chat')" title="私信">💬</button>
                <div class="notification-bell">
                    <button class="btn-icon" onclick="openNotifications()" title="通知">🔔</button>
                    <span class="badge hidden" id="notifBadge">0</span>
                </div>
                <button class="btn-icon" onclick="toggleDarkMode()" title="深色模式">🌙</button>
                <button class="btn btn-sm" onclick="logout()">🚪 退出</button>
            </div>
        </div>
        
        <div class="tabs">
            <button id="tabTimeline" class="active" onclick="switchTab('timeline')">📋 动态</button>
            <button id="tabHot" onclick="switchTab('hot')">🔥 热门</button>
            <button id="tabDiscover" onclick="switchTab('discover')">🔍 发现</button>
            <button id="tabUsers" onclick="switchTab('users')">👥 用户</button>
            <button id="tabChat" onclick="switchTab('chat')">💬 私聊</button>
        </div>
        
        <div class="card post-create" id="postCreateBox">
            <div id="createAvatar"></div>
            <div class="input-area">
                <textarea id="postContent" placeholder="💭 分享新鲜事..."></textarea>
                <button class="btn btn-primary" onclick="createPost()">📝 发布</button>
            </div>
        </div>
        
        <div class="card search-box hidden" id="searchBox">
            <input type="text" id="searchInput" placeholder="🔍 搜索用户..." oninput="searchUsers()">
        </div>
        
        <div id="contentArea"></div>
    </div>
    
    <div class="notification-panel" id="notifPanel">
        <div class="panel-header">
            <h3>🔔 通知</h3>
            <button class="btn btn-sm" onclick="markAllNotificationsRead()">全部已读</button>
        </div>
        <div id="notifList"></div>
    </div>
    
    <div class="modal-overlay hidden" id="profileModal">
        <div class="modal">
            <button class="close-btn" onclick="closeProfileModal()">✕</button>
            <div id="profileContent"></div>
        </div>
    </div>
    
    <div class="modal-overlay hidden" id="editProfileModal">
        <div class="modal">
            <button class="close-btn" onclick="closeEditModal()">✕</button>
            <h3>✏️ 编辑资料</h3>
            <input type="text" id="editNickname" placeholder="昵称">
            <input type="text" id="editBio" placeholder="个性签名" maxlength="50">
            <button class="btn btn-primary" onclick="saveProfile()">💾 保存</button>
            <div id="editMsg" class="success-msg"></div>
        </div>
    </div>
    
    <div class="modal-overlay hidden" id="gameModal">
        <div class="modal" style="max-width:520px;">
            <button class="close-btn" onclick="exitGame()">✕</button>
            <div class="game-status" id="gameStatus">等待开始...</div>
            <div class="game-board-container">
                <canvas id="boardCanvas" class="board-canvas" width="450" height="450"></canvas>
                <div class="game-info">
                    <div class="player-indicator" id="playerBlack">⚫ <span id="blackName">黑方</span></div>
                    <div style="font-weight:700;font-size:18px;">VS</div>
                    <div class="player-indicator" id="playerWhite">⚪ <span id="whiteName">白方</span></div>
                </div>
                <div class="game-chat" id="gameChat"></div>
                <div class="game-chat-input">
                    <input type="text" id="gameChatInput" placeholder="发送消息...">
                    <button class="btn btn-sm" onclick="sendGameChat()">发送</button>
                </div>
                <div id="gameControls">
                    <button class="btn btn-sm danger" onclick="surrenderGame()" style="margin-top:8px;">🏳️ 认输</button>
                </div>
                <div id="rematchArea" class="hidden" style="text-align:center;margin-top:8px;">
                    <p id="rematchStatus" style="margin-bottom:8px;">要再来一局吗？</p>
                    <button class="btn btn-sm" style="background:#27ae60;color:white;border:none;" onclick="requestRematch()">🔄 再来一局</button>
                    <button class="btn btn-sm" onclick="exitGame()">🚪 退出游戏</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay hidden" id="chatModal">
        <div class="modal" style="max-width:480px;max-height:80vh;">
            <button class="close-btn" onclick="closeChatModal()">✕</button>
            <h3 id="chatTitle">💬 私聊</h3>
            <div class="chat-messages" id="chatMessages"></div>
            <div style="display:flex;gap:8px;margin-top:10px;">
                <input type="text" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendPrivateMessage()">
                <button class="btn btn-sm" style="background:#667eea;color:white;border:none;white-space:nowrap;" onclick="sendPrivateMessage()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyByRvYiXfmG7_u3BVaZzUdRvhyUKv-L5yk",
        authDomain: "mini-social-91anguang.firebaseapp.com",
        databaseURL: "https://mini-social-91anguang-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mini-social-91anguang",
        storageBucket: "mini-social-91anguang.firebasestorage.app",
        messagingSenderId: "27129562847",
        appId: "1:27129562847:web:bb225fffee0328654e4b6a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let currentTab = 'timeline';
    let isRegisterMode = false;
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let unreadCount = 0;
    let chatPartner = null;
    let chatListener = null;

    // 五子棋
    let gameData = null;
    let gameId = null;
    let gameListener = null;
    let gameChatListener = null;
    const BOARD_SIZE = 15;
    const CELL_SIZE = 30;
    const PADDING = 15;
    let canvas, ctx;

    const avatarColors = [
        '#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#1abc9c',
        '#3498db', '#9b59b6', '#e91e63', '#00bcd4', '#ff5722',

    function getAvatarColor(username) {
        let hash = 0;
        for (let i = 0; i < username.length; i++) hash = username.charCodeAt(i) + ((hash << 5) - hash);
        return avatarColors[Math.abs(hash) % avatarColors.length];
    }
    function avatarHTML(username, size = 'md') {
        const color = getAvatarColor(username);
        const sizeClass = `av-${size}`;
        return `<div class="color-avatar ${sizeClass}" style="background:${color};">${username[0].toUpperCase()}</div>`;
    }

    function loginOrRegister() {
        const username = document.getElementById('usernameInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        const bio = document.getElementById('bioInput').value.trim();
        const msgDiv = document.getElementById('authMsg');
        if (!username || !password) { msgDiv.textContent = '用户名和密码不能为空'; return; }
        if (username.length < 2 || password.length < 3) { msgDiv.textContent = '用户名至少2位，密码至少3位'; return; }
        if (!/^[a-zA-Z0-9_\u4e00-\u9fa5]+$/.test(username)) { msgDiv.textContent = '用户名只能包含中英文、数字和下划线'; return; }
        const btn = document.getElementById('authBtn');
        btn.disabled = true; btn.textContent = '处理中...';
        db.ref('users/' + username).once('value').then(snapshot => {
            const userData = snapshot.val();
            if (isRegisterMode) {
                if (userData) { msgDiv.textContent = '用户名已存在'; btn.disabled = false; btn.textContent = '注 册'; return; }
                db.ref('users/' + username).set({
                    username, password, displayName: username,
                    bio: bio || '这个人很懒，什么都没写',
                    createdAt: Date.now(), following: {}, followers: {},
                    pinnedPost: '', gameStats: { wins: 0, losses: 0, draws: 0 }
                }).then(() => {
                    msgDiv.className = 'success-msg'; msgDiv.textContent = '注册成功！请登录';
                    isRegisterMode = false;
                    document.getElementById('authTitle').textContent = '登录你的账号';
                    document.getElementById('switchMode').textContent = '没有账号？点击注册';
                    document.getElementById('authBtn').textContent = '登 录';
                    document.getElementById('registerFields').classList.add('hidden');
                    document.getElementById('rememberRow').classList.remove('hidden');
                    btn.disabled = false;
                });
            } else {
                if (!userData) { msgDiv.textContent = '用户不存在'; btn.disabled = false; btn.textContent = '登 录'; return; }
                if (userData.password !== password) { msgDiv.textContent = '密码错误'; btn.disabled = false; btn.textContent = '登 录'; return; }
                if (document.getElementById('rememberCheckbox').checked) saveCredentials(username, password);
                else clearCredentials();
                currentUser = userData;
                if (!currentUser.gameStats) currentUser.gameStats = { wins: 0, losses: 0, draws: 0 };
                showMain();
                btn.disabled = false; btn.textContent = '登 录';
            }
        }).catch(() => { msgDiv.textContent = '错误，请重试'; btn.disabled = false; btn.textContent = isRegisterMode ? '注 册' : '登 录'; });
    }

    function inviteGame(opp) {

    function listenToGameInvites() {}

    function openGame(gid) {
        gameId = gid;

        document.getElementById('gameStatus').textContent = '准备中...';
        document.getElementById('gameChat').innerHTML = '';
        document.getElementById('gameChatInput').value = '';

        document.getElementById('rematchArea').classList.add('hidden');

        });

        if (gameChatListener) { gameChatListener(); gameChatListener = null; }
        if (canvas) canvas.removeEventListener('click', handleBoardClick);
        gameData = null; gameId = null;
    }
    function updateGameUI() {
        if (!gameData) return;
        const isHost = gameData.host === currentUser.username;
        const opp = isHost ? gameData.opponent : gameData.host;
        document.getElementById('blackName').textContent = isHost ? currentUser.username : opp;
        document.getElementById('whiteName').textContent = isHost ? opp : currentUser.username;
        const bi = document.getElementById('playerBlack'), wi = document.getElementById('playerWhite');
        const gc = document.getElementById('gameControls'), ra = document.getElementById('rematchArea'), rs = document.getElementById('rematchStatus');
        if (gameData.status === 'waiting') {
            document.getElementById('gameStatus').textContent = '⏳ 等待对方接受...';
            bi.className = 'player-indicator waiting'; wi.className = 'player-indicator waiting';
            gc.classList.remove('hidden'); ra.classList.add('hidden');
        } else if (gameData.status === 'playing') {
            document.getElementById('gameStatus').textContent = gameData.currentTurn === 'black' ? '⚫ 黑方回合' : '⚪ 白方回合';
            bi.className = 'player-indicator ' + (gameData.currentTurn==='black'?'active':'waiting');
            wi.className = 'player-indicator ' + (gameData.currentTurn==='white'?'active':'waiting');
            gc.classList.remove('hidden'); ra.classList.add('hidden');
        } else {
            gc.classList.add('hidden'); ra.classList.remove('hidden');
            document.getElementById('gameStatus').textContent = gameData.winner === 'draw' ? '🤝 平局！' : `🏆 ${gameData.winner} 获胜！`;
            bi.className = 'player-indicator'; wi.className = 'player-indicator';
            const mr = gameData.rematch||{}, myRm = mr[currentUser.username], oppRm = mr[opp];
            if (myRm && oppRm) { rs.textContent = '🔄 再来一局！开始新游戏...'; setTimeout(() => startNewRound(), 800); }
            else if (myRm) rs.textContent = '✅ 已准备，等待对方...';
            else if (oppRm) rs.textContent = '👆 对方想再来一局！';
            else rs.textContent = '要再来一局吗？';
        }
    }
    function handleBoardClick(e) {
        if (!gameData || gameData.status !== 'playing') return;
        const isHost = gameData.host === currentUser.username;
        const myColor = isHost ? 'black' : 'white';
        if (gameData.currentTurn !== myColor) return;
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
        const col = Math.round(((e.clientX - rect.left) * sx - PADDING) / CELL_SIZE);
        const row = Math.round(((e.clientY - rect.top) * sy - PADDING) / CELL_SIZE);
        if (col < 0 || col >= BOARD_SIZE || row < 0 || row >= BOARD_SIZE) return;
        const key = row + '_' + col;
        if (gameData.board && gameData.board[key]) return;
        const updates = {};
        updates['board/' + key] = myColor;
        updates['currentTurn'] = myColor === 'black' ? 'white' : 'black';
        const board = gameData.board ? { ...gameData.board } : {};
        board[key] = myColor;
        const winner = checkWin(board, row, col, myColor);
        if (winner) { updates['winner'] = winner; updates['status'] = 'ended'; }
        db.ref('games/' + gameId).update(updates);
    }
    function checkWin(board, row, col, color) {
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for (const [dr, dc] of dirs) {
            let cnt = 1;
            for (let i = 1; i < 5; i++) { if (board[(row+dr*i)+'_'+(col+dc*i)] === color) cnt++; else break; }
            for (let i = 1; i < 5; i++) { if (board[(row-dr*i)+'_'+(col-dc*i)] === color) cnt++; else break; }
            if (cnt >= 5) return currentUser.username;
        }
        if (Object.keys(board).length >= BOARD_SIZE * BOARD_SIZE) return 'draw';
        return null;
    }
    function drawBoard() {
        if (!ctx) return;
        const size = BOARD_SIZE * CELL_SIZE + PADDING * 2;
        canvas.width = size; canvas.height = size;
        ctx.fillStyle = '#deb887'; ctx.fillRect(0, 0, size, size);
        ctx.strokeStyle = '#8b7355'; ctx.lineWidth = 1;
        for (let i = 0; i < BOARD_SIZE; i++) {
            ctx.beginPath(); ctx.moveTo(PADDING, PADDING+i*CELL_SIZE); ctx.lineTo(PADDING+(BOARD_SIZE-1)*CELL_SIZE, PADDING+i*CELL_SIZE); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(PADDING+i*CELL_SIZE, PADDING); ctx.lineTo(PADDING+i*CELL_SIZE, PADDING+(BOARD_SIZE-1)*CELL_SIZE); ctx.stroke();
        }
        [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]].forEach(([r,c]) => { ctx.fillStyle='#8b7355'; ctx.beginPath(); ctx.arc(PADDING+c*CELL_SIZE,PADDING+r*CELL_SIZE,4,0,Math.PI*2); ctx.fill(); });
        if (gameData && gameData.board) {
            const entries = Object.entries(gameData.board);
            entries.forEach(([key, color]) => {
                const [row, col] = key.split('_').map(Number);
                const x = PADDING + col * CELL_SIZE, y = PADDING + row * CELL_SIZE;
                const grad = ctx.createRadialGradient(x-3, y-3, 2, x, y, CELL_SIZE/2-2);
                grad.addColorStop(0, color === 'black' ? '#555' : '#fff');
                grad.addColorStop(1, color === 'black' ? '#000' : '#ccc');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, CELL_SIZE/2-2, 0, Math.PI*2); ctx.fill();
                if (color === 'black') { ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.stroke(); }
            });
            if (entries.length > 0) {
                const [lk, lc] = entries[entries.length - 1];
                const [row, col] = lk.split('_').map(Number);
                ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(PADDING+col*CELL_SIZE, PADDING+row*CELL_SIZE, 5, 0, Math.PI*2); ctx.stroke();
            }
        }
    }
    function sendGameChat() {
        const input = document.getElementById('gameChatInput'), text = input.value.trim();
        if (!text || !gameId) return;
        db.ref('games/'+gameId+'/chat').push({ author: currentUser.username, text, time: Date.now() });
        input.value = '';
    }
    function surrenderGame() {
        if (!gameId || !gameData || gameData.status !== 'playing') return;
        if (confirm('确定认输吗？')) {
            db.ref('games/'+gameId).update({ status: 'surrender', winner: currentUser.username === gameData.host ? gameData.opponent : gameData.host });
        }
    }
    function requestRematch() {
        if (!gameId || !gameData) return;
        const opp = gameData.host === currentUser.username ? gameData.opponent : gameData.host;
        if ((gameData.rematch||{})[opp]) startNewRound();
        else { db.ref('games/'+gameId+'/rematch/'+currentUser.username).set(true); document.getElementById('rematchStatus').textContent = '✅ 已准备，等待对方...'; }
    }
    function startNewRound() {
        db.ref('games/'+gameId).update({ board: {}, currentTurn: 'black', status: 'playing', winner: '', rematch: {}, chat: {} });
        document.getElementById('gameChat').innerHTML = '';
    }
    function exitGame() {
        if (gameData && gameData.status === 'playing' && confirm('退出将视为认输，确定吗？')) {
            db.ref('games/'+gameId).update({ status: 'surrender', winner: currentUser.username === gameData.host ? gameData.opponent : gameData.host });
        }
        closeGame();
    }
    function updateStats() {
        if (!gameData || !gameData.winner || gameData.winner === 'draw') return;
        const gs = currentUser.gameStats || { wins: 0, losses: 0, draws: 0 };
        if (gameData.winner === currentUser.username) gs.wins = (gs.wins||0) + 1;
        else gs.losses = (gs.losses||0) + 1;
        db.ref('users/'+currentUser.username+'/gameStats').set(gs);
        currentUser.gameStats = gs;
    }

    // ========== 私聊 ==========
    function getChatId(user1, user2) {
        return [user1, user2].sort().join('_');
    }
    
    function openChat(partner) {
        chatPartner = partner;
        document.getElementById('chatTitle').textContent = '💬 与 ' + partner + ' 聊天';
        document.getElementById('chatMessages').innerHTML = '<div class="loading">加载中...</div>';
        document.getElementById('chatInput').value = '';
        document.getElementById('chatModal').classList.remove('hidden');
        
        if (chatListener) chatListener();
        const chatId = getChatId(currentUser.username, partner);
        chatListener = db.ref('chats/' + chatId).on('value', s => {
            const msgs = [];
            s.forEach(c => msgs.push({ id: c.key, ...c.val() }));
            msgs.sort((a, b) => a.time - b.time);
            const div = document.getElementById('chatMessages');
            div.innerHTML = msgs.length === 0 ? '<div style="text-align:center;color:var(--text-secondary);padding:20px;">开始聊天吧！</div>' :
                msgs.map(m => `<div class="chat-bubble ${m.from === currentUser.username ? 'mine' : 'theirs'}">${esc(m.text)}<span class="bubble-time">${formatTime(m.time)}</span></div>`).join('');
            div.scrollTop = div.scrollHeight;
        });
    }
    
    function sendPrivateMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !chatPartner) return;
        const chatId = getChatId(currentUser.username, chatPartner);
        db.ref('chats/' + chatId).push({
            from: currentUser.username,
            to: chatPartner,
            text: text,
            time: Date.now()
        }).then(() => { input.value = ''; });
    }
    
    function closeChatModal() {
        document.getElementById('chatModal').classList.add('hidden');
        if (chatListener) { chatListener(); chatListener = null; }
        chatPartner = null;
    }
    
    function loadChatContacts() {
        const area = document.getElementById('contentArea');
        area.innerHTML = '<div class="loading">加载中...</div>';
        
        db.ref('chats').once('value').then(s => {
            const contacts = new Map();
            const me = currentUser.username;
            s.forEach(child => {
                const chatId = child.key;
                if (!chatId.includes(me)) return;
                const msgs = Object.values(child.val() || {});
                if (msgs.length === 0) return;
                const lastMsg = msgs.sort((a, b) => b.time - a.time)[0];
                const partner = chatId.split('_').find(u => u !== me);
                contacts.set(partner, lastMsg);
            });
            
            // 也显示所有关注的用户（即使没聊过天）
            const following = Object.keys(currentUser.following || {});
            following.forEach(f => { if (!contacts.has(f)) contacts.set(f, null); });
            
            const sorted = [...contacts.entries()].sort((a, b) => {
                const ta = a[1] ? a[1].time : 0;
                const tb = b[1] ? b[1].time : 0;
                return tb - ta;
            });
            
            if (sorted.length === 0) {
                area.innerHTML = '<div class="empty-state">💬 关注好友后可以私聊</div>';
                return;
            }
            
            area.innerHTML = sorted.map(([partner, lastMsg]) => {
                const lastText = lastMsg ? (lastMsg.from === me ? '你: ' : '') + lastMsg.text : '点击开始聊天';
                const lastTime = lastMsg ? formatTime(lastMsg.time) : '';
                return `<div class="card contact-item" onclick="openChat('${partner}')">
                    ${avatarHTML(partner)}<div class="contact-info"><div class="contact-name">${partner}</div><div class="contact-last">${esc(lastText.substring(0, 40))}</div></div>
                    <div class="contact-time">${lastTime}</div></div>`;
            }).join('');
        });
    }

    // ========== 个人主页 ==========
    function showUserProfile(username) {
        db.ref('users/' + username).once('value').then(snapshot => {
            const user = snapshot.val();
            if (!user) return;
            const followers = Object.keys(user.followers || {}).length;
            const following = Object.keys(user.following || {}).length;
            const isF = (currentUser.following || {})[username] === true;
            const isMe = username === currentUser.username;
            const joinDays = user.createdAt ? Math.floor((Date.now() - user.createdAt) / 86400000) : 0;
            const gs = user.gameStats || { wins: 0, losses: 0, draws: 0 };
            
            document.getElementById('profileContent').innerHTML = `
                <div class="profile-header">
                    <div style="display:flex;justify-content:center;margin-bottom:10px;">${avatarHTML(username, 'lg')}</div>
                    <h3>${user.displayName || user.username}</h3>
                    <p style="color:var(--text-secondary);font-size:13px;">@${user.username}</p>
                    <p class="bio">${user.bio || '这个人很懒，什么都没写'}</p>
                    <p style="font-size:12px;color:var(--text-secondary);">🎂 加入 ${joinDays} 天</p>
                    ${isMe ? `<button class="btn btn-sm" onclick="openEditProfile()">✏️ 编辑</button>` :
                      `<div style="display:flex;gap:6px;justify-content:center;margin-top:8px;">
                          <button class="btn btn-sm chat-btn" onclick="openChat('${username}')">💬 私聊</button>
                          <button class="btn btn-sm game" onclick="inviteGame('${username}')">♟️ 挑战</button>
                          <button class="btn btn-sm ${isF?'following':''}" onclick="toggleFollow('${username}',this);closeProfileModal();">${isF?'已关注':'+关注'}</button>
                      </div>`}
                </div>
                <div class="profile-stats">
                    <div class="stat"><div class="stat-num" id="profilePostCount">0</div><div class="stat-label">动态</div></div>
                    <div class="stat"><div class="stat-num">${followers}</div><div class="stat-label">粉丝</div></div>
                    <div class="stat"><div class="stat-num">${following}</div><div class="stat-label">关注</div></div>
                    <div class="stat"><div class="stat-num" style="color:#27ae60;">${gs.wins||0}</div><div class="stat-label">🏆胜</div></div>
                    <div class="stat"><div class="stat-num" style="color:#e74c3c;">${gs.losses||0}</div><div class="stat-label">😢负</div></div>
                </div>
                <hr style="border-color:var(--border);margin:10px 0;">
                <h4>📝 ${isMe?'我的':'TA的'}动态</h4>
                <div id="profilePosts"><div class="loading">加载中</div></div>
            `;
            document.getElementById('profileModal').classList.remove('hidden');
            
            db.ref('posts').orderByChild('timestamp').once('value').then(s => {
                const posts = []; s.forEach(c => { if (c.val().author === username) posts.push({ id: c.key, ...c.val() }); });
                posts.sort((a, b) => b.timestamp - a.timestamp);
                document.getElementById('profilePostCount').textContent = posts.length;
                const pp = document.getElementById('profilePosts');
                pp.innerHTML = posts.length === 0 ? '<div class="empty-state">还没有动态</div>' :
                    posts.map(p => `<div style="padding:10px 0;border-bottom:1px solid var(--border);"><div style="font-size:14px;">${esc(p.content)}</div><div style="font-size:11px;color:var(--text-secondary);display:flex;justify-content:space-between;"><span>${formatTime(p.timestamp)}</span><span>❤️ ${Object.keys(p.likes||{}).length}</span></div></div>`).join('');
            });
        });
    }
    function showMyProfile() { showUserProfile(currentUser.username); }
    function closeProfileModal() { document.getElementById('profileModal').classList.add('hidden'); }
    function openEditProfile() { document.getElementById('editNickname').value = currentUser.displayName || ''; document.getElementById('editBio').value = currentUser.bio || ''; document.getElementById('editProfileModal').classList.remove('hidden'); }
    function closeEditModal() { document.getElementById('editProfileModal').classList.add('hidden'); }
    function saveProfile() {
        const nn = document.getElementById('editNickname').value.trim(), nb = document.getElementById('editBio').value.trim();
        const u = {}; if (nn) u.displayName = nn; if (nb) u.bio = nb;
        db.ref('users/'+currentUser.username).update(u).then(() => {
            if (nn) currentUser.displayName = nn; if (nb) currentUser.bio = nb;
            document.getElementById('navUsername').textContent = currentUser.displayName || currentUser.username;
            document.getElementById('editMsg').textContent = '✅ 保存成功！';
            setTimeout(closeEditModal, 1000);
        });
    }

    function toggleLike(postId) {
        const ref = db.ref('posts/'+postId+'/likes/'+currentUser.username);
        ref.once('value').then(s => {
            if (s.val()) ref.remove();
            else { ref.set(true); db.ref('posts/'+postId+'/author').once('value').then(as => { const a = as.val(); if (a && a !== currentUser.username) sendNotification(a, 'like', currentUser.username, postId); }); }
        });
    }
    function toggleComments(postId) { const el = document.getElementById('comments-'+postId); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
    function addComment(postId) {
        const text = document.getElementById('commentInput-'+postId).value.trim();
        if (!text) return;
        db.ref('posts/'+postId+'/comments').push({ author: currentUser.username, text, time: Date.now() }).then(() => {
            document.getElementById('commentInput-'+postId).value = '';
            db.ref('posts/'+postId+'/author').once('value').then(as => { const a = as.val(); if (a && a !== currentUser.username) sendNotification(a, 'comment', currentUser.username, postId); });
        });
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function formatTime(ts) {
        const diff = Date.now() - ts;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return Math.floor(diff/60000)+'分钟前';
        if (diff < 86400000) return Math.floor(diff/3600000)+'小时前';
        if (diff < 604800000) return Math.floor(diff/86400000)+'天前';
        return new Date(ts).toLocaleDateString('zh-CN');
    }

    document.addEventListener('click', e => {
        const panel = document.getElementById('notifPanel');
        if (panel.classList.contains('open') && !panel.contains(e.target) && !e.target.closest('.notification-bell')) closeNotifications();
    });
    document.getElementById('profileModal').addEventListener('click', function(e) { if (e.target === this) closeProfileModal(); });
    document.getElementById('editProfileModal').addEventListener('click', function(e) { if (e.target === this) closeEditModal(); });
    document.getElementById('gameModal').addEventListener('click', function(e) { if (e.target === this) exitGame(); });
    document.getElementById('chatModal').addEventListener('click', function(e) { if (e.target === this) closeChatModal(); });
</script>
</body>
</html>
